# XcodeGen spec — the Xcode project is generated from this file in CI, so no
# fragile .xcodeproj is committed. Regenerate locally with: `xcodegen generate`.
name: Growly

options:
  bundleIdPrefix: com.hoangnd107
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    # Unsigned build for Sideloadly — signing is done on-device by Sideloadly.
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGN_IDENTITY: ""
    MARKETING_VERSION: "1.19.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Growly:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hoangnd107.growly
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_CFBundleDisplayName: "Growly"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown"
        INFOPLIST_KEY_NSFaceIDUsageDescription: "Unlock your private journal with Face ID."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Dictate your reflections with your voice."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Transcribe your spoken reflections on device."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Attach a photo to a reflection."
        INFOPLIST_KEY_NSCameraUsageDescription: "Take a photo to attach to a note or reflection."
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Tag your reflections and notes with where you are."

  GrowlyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Growly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hoangnd107.growly.tests
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  Growly:
    build:
      targets:
        Growly: all
        GrowlyTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - GrowlyTests
    archive:
      config: Release
