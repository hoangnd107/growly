name: iOS Build (Unsigned IPA)

# Builds an UNSIGNED .ipa of the native SwiftUI app on a free macOS runner.
# The Xcode project is generated from project.yml via XcodeGen, then built with
# code signing disabled and packaged into an IPA for Sideloadly (free Apple ID).

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
  workflow_dispatch:

concurrency:
  group: ios-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  SCHEME: Growly
  CONFIGURATION: Release
  # Run JavaScript actions on Node 24 (Node 20 is deprecated on the runners).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Toolchain info
        run: |
          xcodebuild -version
          xcodebuild -showsdks | grep -i iphoneos || true

      - name: Build unsigned .app
        run: |
          set -euo pipefail
          xcodebuild \
            -project Growly.xcodeproj \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            clean build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package unsigned IPA
        id: package
        run: |
          set -euo pipefail
          APP_PATH=$(find build/Build/Products/${CONFIGURATION}-iphoneos -maxdepth 1 -name '*.app' | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app produced by the build."
            exit 1
          fi
          echo "App: $APP_PATH"
          VER=$(tr -d ' \t\n\r' < VERSION 2>/dev/null || echo "0.0.0")
          IPA="Growly-${VER}-${{ github.run_number }}.ipa"
          rm -rf Payload dist
          mkdir -p Payload dist
          cp -R "$APP_PATH" Payload/
          zip -qq -r "dist/$IPA" Payload
          echo "ipa=$IPA" >> "$GITHUB_OUTPUT"
          ls -lh "dist/$IPA"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.ipa }}
          path: dist/*.ipa
          if-no-files-found: error
          retention-days: 14
