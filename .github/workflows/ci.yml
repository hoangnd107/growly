name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Swift
        run: swift --version
      - name: Build
        run: swift build --configuration release
      - name: Test
        run: swift test
